  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"518bdeb0-7488-43e9-acc8-353c5e53b69d\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Fraunces';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"9cb70616-e5f6-48f4-bd3a-e4c2ad80a338\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Fraunces';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"8c0b22ec-fdfc-4a38-bf98-3a03ae8957e4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ════════════════════════════════════════════════════════════\n   THE REVENUE ROOM — Design System\n   ──────────────────────────────────────────────────────────\n   Tokens (colors, type, spacing) live here. Component classes\n   are grouped by section. Safe to lift wholesale into Tailwind\n   tokens or CSS modules during a Claude Code build.\n   ════════════════════════════════════════════════════════════ */\n\n:root {\n  /* Color tokens */\n  --ink:          #2a2a22;\n  --ink-soft:     #3d342b;\n  --cream:        #fff3e2;\n  --warm-white:   #fffaf3;\n  --gold:         #FFA74F;\n  --gold-deep:    #c9943a;\n  --gold-light:   #ffc474;\n  --gold-pale:    #fff3e2;\n  --rust:         #5e734e;\n  --forest:       #3e4d34;\n  --forest-deep:  #2d3a25;\n  --forest-light: #5e734e;\n  --muted:        #8a7d6e;\n  --border:       #e0d8ce;\n  --border-soft:  #ece4d8;\n\n  /* Type */\n  --font-display: 'Fraunces', Georgia, serif;\n  --font-body:    'DM Sans', system-ui, sans-serif;\n  --font-mono:    'DM Mono', 'JetBrains Mono', ui-monospace, monospace;\n\n  /* Layout */\n  --nav-height:   68px;\n  --radius-sm:    4px;\n  --radius:       6px;\n  --radius-lg:    12px;\n  --shadow-card:  0 1px 2px rgba(42,42,34,0.04);\n  --shadow-lift:  0 8px 24px -8px rgba(42,42,34,0.12);\n}\n\n* { margin: 0; padding: 0; box-sizing: border-box; }\nhtml { scroll-behavior: smooth; scroll-padding-top: var(--nav-height); }\nbody {\n  background: var(--warm-white);\n  color: var(--ink);\n  font-family: var(--font-body);\n  font-weight: 300;\n  line-height: 1.7;\n  font-size: 17px;\n  text-rendering: optimizeLegibility;\n  -webkit-font-smoothing: antialiased;\n}\nimg { display: block; max-width: 100%; }\na { color: inherit; }\n\n/* ════════════════════════════════\n   ANNOUNCEMENT BAR\n════════════════════════════════ */\n.bar {\n  background: var(--forest);\n  color: var(--gold-light);\n  text-align: center;\n  padding: 11px 20px;\n  font-size: 11px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  font-weight: 500;\n  font-family: var(--font-mono);\n}\n.bar a { color: var(--gold-light); text-decoration: underline; text-underline-offset: 3px; }\n\n/* ════════════════════════════════\n   STICKY NAV\n════════════════════════════════ */\n.nav {\n  position: sticky;\n  top: 0;\n  z-index: 50;\n  background: rgba(255, 250, 243, 0.92);\n  backdrop-filter: saturate(140%) blur(12px);\n  -webkit-backdrop-filter: saturate(140%) blur(12px);\n  border-bottom: 1px solid transparent;\n  transition: border-color 0.2s, box-shadow 0.2s;\n}\n.nav.is-scrolled {\n  border-bottom-color: var(--border);\n  box-shadow: 0 1px 0 rgba(42,42,34,0.02);\n}\n.nav-inner {\n  max-width: 1180px;\n  margin: 0 auto;\n  height: var(--nav-height);\n  padding: 0 28px;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 28px;\n}\n.nav-brand {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: 19px;\n  letter-spacing: -0.01em;\n  color: var(--ink);\n  text-decoration: none;\n  display: flex;\n  align-items: center;\n  gap: 10px;\n}\n.nav-brand-mark {\n  width: 26px; height: 26px;\n  border-radius: 50%;\n  background: var(--forest);\n  position: relative;\n  flex-shrink: 0;\n}\n.nav-brand-mark::after {\n  content: '';\n  position: absolute;\n  inset: 6px;\n  border-radius: 50%;\n  background: var(--gold);\n}\n.nav-links {\n  display: flex;\n  gap: 4px;\n  align-items: center;\n  list-style: none;\n}\n.nav-link {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: var(--ink);\n  text-decoration: none;\n  padding: 9px 14px;\n  border-radius: 100px;\n  position: relative;\n  transition: color 0.15s, background 0.15s;\n}\n.nav-link:hover { color: var(--forest); background: rgba(62,77,52,0.06); }\n.nav-link.is-active {\n  color: var(--forest);\n}\n.nav-link.is-active::after {\n  content: '';\n  position: absolute;\n  left: 50%;\n  bottom: 2px;\n  transform: translateX(-50%);\n  width: 4px; height: 4px;\n  border-radius: 50%;\n  background: var(--gold);\n}\n.nav-cta {\n  background: var(--ink);\n  color: var(--warm-white);\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  font-weight: 500;\n  padding: 11px 20px;\n  border-radius: 100px;\n  text-decoration: none;\n  transition: background 0.15s, transform 0.15s;\n  white-space: nowrap;\n}\n.nav-cta:hover { background: var(--forest); transform: translateY(-1px); }\n.nav-toggle { display: none; background: none; border: 0; cursor: pointer; padding: 8px; }\n\n@media (max-width: 860px) {\n  .nav-links { display: none; }\n  .nav-toggle { display: block; }\n  .nav-cta { padding: 9px 14px; font-size: 10px; }\n}\n\n/* ════════════════════════════════\n   TYPE HELPERS\n════════════════════════════════ */\n.eyebrow {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--gold);\n  display: block;\n  margin-bottom: 16px;\n}\n.kicker {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--rust);\n  display: block;\n  margin-bottom: 16px;\n}\n.section-h2 {\n  font-family: var(--font-display);\n  font-size: clamp(26px, 4vw, 42px);\n  font-weight: 700;\n  line-height: 1.2;\n  color: var(--ink);\n  margin-bottom: 16px;\n  letter-spacing: -0.01em;\n  text-wrap: balance;\n}\n.section-h2-white { color: #fff; }\n\n/* ════════════════════════════════\n   LAYOUT HELPERS\n════════════════════════════════ */\n.wrap    { max-width: 780px;  margin: 0 auto; padding: 0 24px; }\n.wrap-md { max-width: 920px;  margin: 0 auto; padding: 0 24px; }\n.wrap-lg { max-width: 1100px; margin: 0 auto; padding: 0 24px; }\n.wrap-xl { max-width: 1240px; margin: 0 auto; padding: 0 24px; }\n.pad     { padding-top: 88px;  padding-bottom: 88px; }\n.pad-sm  { padding-top: 60px;  padding-bottom: 60px; }\n.pad-lg  { padding-top: 120px; padding-bottom: 120px; }\n\n/* ════════════════════════════════\n   BUTTONS\n════════════════════════════════ */\n.cta-btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  background: var(--gold);\n  color: var(--ink);\n  font-weight: 500;\n  font-size: 13px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  padding: 18px 36px;\n  border-radius: 2px;\n  text-decoration: none;\n  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;\n  cursor: pointer;\n  border: none;\n  font-family: var(--font-mono);\n}\n.cta-btn:hover {\n  background: var(--gold-light);\n  transform: translateY(-1px);\n  box-shadow: 0 8px 20px -8px rgba(201,148,58,0.5);\n}\n.cta-btn-arrow { transition: transform 0.2s; display: inline-block; }\n.cta-btn:hover .cta-btn-arrow { transform: translateX(4px); }\n\n.cta-btn--ghost {\n  background: transparent;\n  color: var(--ink);\n  border: 1px solid var(--border);\n}\n.cta-btn--ghost:hover { background: #fff; border-color: var(--forest); box-shadow: none; }\n\n.cta-btn--forest {\n  background: var(--forest);\n  color: var(--warm-white);\n}\n.cta-btn--forest:hover { background: var(--forest-deep); }\n\n/* ════════════════════════════════\n   HERO (animated)\n════════════════════════════════ */\n.hero {\n  background: var(--cream);\n  border-bottom: 1px solid var(--border);\n  padding: 80px 24px 96px;\n  text-align: center;\n  position: relative;\n  overflow: hidden;\n}\n.hero-stage {\n  position: absolute;\n  inset: 0;\n  pointer-events: none;\n  overflow: hidden;\n}\n.hero-glow-a, .hero-glow-b {\n  position: absolute;\n  border-radius: 50%;\n  filter: blur(8px);\n}\n.hero-glow-a {\n  top: -160px; right: -120px;\n  width: 560px; height: 560px;\n  background: radial-gradient(circle, rgba(201,148,58,0.16) 0%, transparent 65%);\n  animation: floatA 14s ease-in-out infinite;\n}\n.hero-glow-b {\n  bottom: -140px; left: -120px;\n  width: 460px; height: 460px;\n  background: radial-gradient(circle, rgba(62,77,52,0.10) 0%, transparent 70%);\n  animation: floatB 18s ease-in-out infinite;\n}\n@keyframes floatA {\n  0%,100% { transform: translate(0,0) scale(1); }\n  50%     { transform: translate(-20px, 30px) scale(1.05); }\n}\n@keyframes floatB {\n  0%,100% { transform: translate(0,0) scale(1); }\n  50%     { transform: translate(30px,-20px) scale(1.07); }\n}\n.hero-orbit {\n  position: absolute;\n  top: 50%; left: 50%;\n  width: 720px; height: 720px;\n  margin: -360px 0 0 -360px;\n  pointer-events: none;\n  opacity: 0.5;\n}\n.hero-orbit svg {\n  width: 100%; height: 100%;\n  animation: spin 60s linear infinite;\n}\n@keyframes spin {\n  to { transform: rotate(360deg); }\n}\n.hero-content {\n  position: relative;\n  z-index: 1;\n  max-width: 820px;\n  margin: 0 auto;\n}\n.hero-meta {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--forest);\n  background: rgba(255,255,255,0.7);\n  border: 1px solid var(--border);\n  padding: 7px 16px 7px 12px;\n  border-radius: 100px;\n  margin-bottom: 28px;\n}\n.hero-meta-dot {\n  width: 8px; height: 8px;\n  border-radius: 50%;\n  background: var(--gold);\n  box-shadow: 0 0 0 4px rgba(255,167,79,0.18);\n  animation: pulse 2.4s ease-in-out infinite;\n}\n@keyframes pulse {\n  0%,100% { box-shadow: 0 0 0 4px rgba(255,167,79,0.18); }\n  50%     { box-shadow: 0 0 0 8px rgba(255,167,79,0.05); }\n}\n.hero-title {\n  font-family: var(--font-display);\n  font-size: clamp(48px, 8vw, 92px);\n  font-weight: 900;\n  line-height: 1.0;\n  color: var(--ink);\n  margin-bottom: 24px;\n  letter-spacing: -0.025em;\n  text-wrap: balance;\n}\n.hero-title .tr-amp {\n  font-style: italic;\n  font-weight: 500;\n  color: var(--forest);\n}\n.hero-tagline {\n  font-size: clamp(17px, 2.2vw, 22px);\n  color: var(--ink-soft);\n  max-width: 620px;\n  margin: 0 auto 36px;\n  line-height: 1.55;\n  text-wrap: pretty;\n}\n.hero-tagline strong { color: var(--ink); font-weight: 500; }\n\n.hero-actions {\n  display: inline-flex;\n  flex-wrap: wrap;\n  gap: 14px;\n  justify-content: center;\n  margin-bottom: 56px;\n}\n\n.pill-row {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 10px;\n  justify-content: center;\n  max-width: 720px;\n  margin: 0 auto;\n}\n.pill {\n  background: rgba(255,255,255,0.7);\n  border: 1px solid var(--border);\n  border-radius: 100px;\n  padding: 7px 16px 7px 14px;\n  font-size: 13px;\n  color: var(--ink);\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n}\n.pill svg { color: var(--forest); }\n\n/* Hero stats strip */\n.hero-stats {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 0;\n  max-width: 900px;\n  margin: 56px auto 0;\n  padding: 28px 0 0;\n  border-top: 1px solid var(--border);\n  position: relative;\n  z-index: 1;\n}\n.hero-stat { text-align: center; padding: 0 16px; position: relative; }\n.hero-stat + .hero-stat::before {\n  content: '';\n  position: absolute;\n  left: 0; top: 8px; bottom: 8px;\n  width: 1px;\n  background: var(--border);\n}\n.hero-stat-num {\n  font-family: var(--font-display);\n  font-size: clamp(28px, 4vw, 40px);\n  font-weight: 700;\n  line-height: 1;\n  color: var(--ink);\n  letter-spacing: -0.02em;\n  display: block;\n  margin-bottom: 6px;\n}\n.hero-stat-num em {\n  font-style: italic;\n  font-weight: 500;\n  color: var(--gold-deep);\n}\n.hero-stat-label {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--muted);\n}\n@media (max-width: 720px) {\n  .hero-stats { grid-template-columns: repeat(2, 1fr); gap: 24px 0; }\n  .hero-stat:nth-child(3)::before { display: none; }\n}\n\n.hero-italic {\n  text-align: center;\n  font-family: var(--font-display);\n  font-style: italic;\n  font-size: 18px;\n  color: var(--forest);\n  margin-top: 36px;\n  max-width: 560px;\n  margin-left: auto;\n  margin-right: auto;\n  line-height: 1.55;\n}\n\n/* ════════════════════════════════\n   HEADLINE BLOCK\n════════════════════════════════ */\n.headline-block {\n  text-align: center;\n  padding: 96px 24px 0;\n}\n.headline-main {\n  font-family: var(--font-display);\n  font-size: clamp(32px, 5vw, 58px);\n  font-weight: 700;\n  line-height: 1.12;\n  color: var(--ink);\n  max-width: 720px;\n  margin: 0 auto 18px;\n  letter-spacing: -0.015em;\n  text-wrap: balance;\n}\n.headline-sub {\n  font-size: 18px;\n  color: var(--muted);\n  max-width: 500px;\n  margin: 0 auto;\n  line-height: 1.65;\n}\n\n/* ════════════════════════════════\n   PROBLEM\n════════════════════════════════ */\n.problem-prose { padding: 56px 24px 0; }\n.problem-prose p { color: var(--ink-soft); margin-bottom: 20px; line-height: 1.8; }\n.problem-prose p strong { color: var(--ink); font-weight: 500; }\n\n.pain-grid {\n  display: grid;\n  grid-template-colum ackground: var(--border);\n  z-index: 0;\n}\n.timeline-step {\n  position: relative;\n  z-index: 1;\n  text-align: center;\n  padding: 0 12px;\n}\n.timeline-step-num {\n  width: 56px; height: 56px;\n  border-radius: 50%;\n  background: var(--cream);\n  border: 2px solid var(--forest);\n  color: var(--forest);\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: 22px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  margin: 0 auto 18px;\n  transition: background 0.2s, transform 0.2s;\n}\n.timeline-step:hover .timeline-step-num { background: var(--gold); border-color: var(--gold); transform: scale(1.05); }\n.timeline-step-label {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--gold-deep);\n  display: block;\n  margin-bottom: 6px;\n}\n.timeline-step-title {\n  font-family: var(--font-display);\n  font-size: 17px;\n  font-weight: 700;\n  color: var(--ink);\n  margin-bottom: 8px;\n  letter-spacing: -0.005em;\n}\n.timeline-step-desc {\n  font-size: 13px;\n  color: var(--muted);\n  line-height: 1.55;\n}\n.timeline-step-time {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: var(--forest);\n  margin-top: 10px;\n  display: inline-block;\n  background: var(--cream);\n  padding: 4px 10px;\n  border-radius: 100px;\n}\n\n@media (max-width: 720px) {\n  .timeline-steps { grid-template-columns: 1fr; gap: 32px; }\n  .timeline-steps::before { display: none; }\n}\n\n/* ════════════════════════════════\n   GUARANTEE\n════════════════════════════════ */\n.guarantee { background: var(--cream); padding: 88px 24px; }\n.guarantee-box {\n  max-width: 720px;\n  margin: 0 auto;\n  border: 1.5px solid var(--forest);\n  border-radius: var(--radius);\n  padding: 64px 56px;\n  text-align: center;\n  position: relative;\n  background: #fff;\n}\n.g-badge {\n  position: absolute;\n  top: -18px;\n  left: 50%;\n
