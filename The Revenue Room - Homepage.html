ze: 14px;\n  color: rgba(255,255,255,0.65);\n  text-decoration: none;\n  transition: color 0.15s;\n}\n.footer-col a:hover { color: var(--gold-light); }\n.footer-bottom {\n  max-width: 1180px;\n  margin: 0 auto;\n  padding-top: 24px;\n  border-top: 1px solid rgba(255,255,255,0.08);\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.06em;\n  color: rgba(255,255,255,0.4);\n  flex-wrap: wrap;\n  gap: 12px;\n}\n.footer-bottom a { color: var(--gold); text-decoration: none; }\n\n@media (max-width: 760px) {\n  .footer-inner { grid-template-columns: 1fr 1fr; gap: 36px; }\n  .footer-brand-col { grid-column: 1 / -1; }\n}\n\n/* ════════════════════════════════\n   PAGE HEADER (sub-pages)\n════════════════════════════════ */\n.page-header {\n  background: var(--cream);\n  border-bottom: 1px solid var(--border);\n  padding: 80px 24px 88px;\n  text-align: center;\n  position: relative;\n  overflow: hidden;\n}\n.page-header::before {\n  content: '';\n  position: absolute;\n  top: -160px; right: -120px;\n  width: 460px; height: 460px;\n  border-radius: 50%;\n  background: radial-gradient(circle, rgba(201,148,58,0.10) 0%, transparent 68%);\n  pointer-events: none;\n}\n.page-header-inner { position: relative; max-width: 760px; margin: 0 auto; }\n.page-header h1 {\n  font-family: var(--font-display);\n  font-size: clamp(42px, 6vw, 68px);\n  font-weight: 900;\n  color: var(--ink);\n  line-height: 1;\n  margin-bottom: 20px;\n  letter-spacing: -0.025em;\n  text-wrap: balance;\n}\n.page-header p {\n  font-size: clamp(17px, 2vw, 20px);\n  color: var(--ink-soft);\n  max-width: 620px;\n  margin: 0 auto;\n  line-height: 1.55;\n  text-wrap: pretty;\n}\n\n/* ════════════════════════════════\n   RESPONSIVE\n════════════════════════════════ */\n@media (max-width: 760px) {\n  .rapport-inner { grid-template-columns: 1fr; gap: 32px; }\n  .rapport-photo { width: 220px; height: 286px; margin: 0 auto; }\n  .mod summary { grid-template-columns: 1fr; }\n  .mod .mod-body { padding: 0 24px 24px; }\n  .mod-left { flex-direction: row; gap: 16px; align-items: baseline; }\n  .community-grid { grid-template-columns: 1fr; }\n  .faq-grid { grid-template-columns: 1fr; }\n  .faq-grid details { border-right: none; }\n  .faq-grid details:nth-last-child(-n+2) { border-bottom: 1px solid var(--border); }\n  .faq-grid details:last-child { border-bottom: none; }\n  .guarantee-box { padding: 56px 28px; }\n  .method-flow { flex-direction: column; align-items: stretch; }\n  .method-arrow { transform: rotate(90deg); text-align: center; padding: 8px 0; }\n  .pull-quote { padding: 36px 28px; }\n  .partners-cta { flex-direction: column; }\n  .partners-cta-text { text-align: center; }\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<!-- ════════════════════════════════════════\n     ANNOUNCEMENT BAR\n════════════════════════════════════════ -->\n<div class=\"bar\">\n  Founding Cohort 02 · 10 seats · Cohort starts Sept 8, 2026 · <a href=\"apply.html\">Applications close July 1st<\u002Fa>\n<\u002Fdiv>\n\n<!-- ════════════════════════════════════════\n     STICKY NAV\n════════════════════════════════════════ -->\n<nav class=\"nav\" id=\"topnav\" data-screen-label=\"Site Nav\">\n  <div class=\"nav-inner\">\n    <a href=\"index.html\" class=\"nav-brand\">\n      <span class=\"nav-brand-mark\"><\u002Fspan>\n      The Revenue Room\n    <\u002Fa>\n    <ul class=\"nav-links\">\n      <li><a class=\"nav-link\" href=\"#program\" data-target=\"program\">Program<\u002Fa><\u002Fli>\n      <li><a class=\"nav-link\" href=\"#outcomes\" data-target=\"outcomes\">Outcomes<\u002Fa><\u002Fli>\n      <li><a class=\"nav-link\" href=\"#mentors\" data-target=\"mentors\">Mentors<\u002Fa><\u002Fli>\n      <li><a class=\"nav-link\" href=\"community.html\">Community<\u002Fa><\u002Fli>\n      <li><a class=\"nav-link\" href=\"about.html\">About<\u002Fa><\u002Fli>\n      <li><a class=\"nav-link\" href=\"#faq\" data-target=\"faq\">FAQ<\u002Fa><\u002Fli>\n    <\u002Ful>\n    <a href=\"apply.html\" class=\"nav-cta\">Apply →<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ════════════════════════════════════════\n     HERO — animated\n════════════════════════════════════════ -->\n<section class=\"hero\" data-screen-label=\"Hero\">\n  <div class=\"hero-stage\">\n    <div class=\"hero-glow-a\"><\u002Fdiv>\n    <div class=\"hero-glow-b\"><\u002Fdiv>\n    <div class=\"hero-orbit\">\n      <svg viewBox=\"0 0 720 720\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\">\n        <circle cx=\"360\" cy=\"360\" r=\"260\" stroke=\"rgba(62,77,52,0.12)\" stroke-width=\"1\" stroke-dasharray=\"3 8\"><\u002Fcircle>\n        <circle cx=\"360\" cy=\"360\" r=\"320\" stroke=\"rgba(201,148,58,0.18)\" stroke-width=\"1\" stroke-dasharray=\"2 12\"><\u002Fcircle>\n        <circle cx=\"360\" cy=\"100\" r=\"6\" fill=\"#FFA74F\"><\u002Fcircle>\n        <circle cx=\"620\" cy=\"360\" r=\"5\" fill=\"#3e4d34\"><\u002Fcircle>\n        <circle cx=\"360\" cy=\"680\" r=\"4\" fill=\"#c9943a\"><\u002Fcircle>\n        <circle cx=\"100\" cy=\"360\" r=\"5\" fill=\"#5e734e\"><\u002Fcircle>\n        <circle cx=\"540\" cy=\"180\" r=\"3\" fill=\"#FFA74F\"><\u002Fcircle>\n        <circle cx=\"180\" cy=\"540\" r=\"3\" fill=\"#3e4d34\"><\u002Fcircle>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hero-content\">\n    <span class=\"hero-meta\">\n      <span class=\"hero-meta-dot\"><\u002Fspan>\n      Founding Cohort 02 · 10 seats remaining\n    <\u002Fspan>\n    <h1 class=\"hero-title\">\n      The Revenue Room\n    <\u002Fh1>\n    <p class=\"hero-tagline\">\n      A <strong>6-week community accelerator<\u002Fstrong> where technical founders stop winging it\n      and build a real sales system, together, from the ground up.\n    <\u002Fp>\n\n    <div class=\"hero-actions\">\n      <a href=\"apply.html\" class=\"cta-btn\">\n        Apply for Cohort 02\n        <span class=\"cta-btn-arrow\">→<\u002Fspan>\n      <\u002Fa>\n      <a href=\"#program\" class=\"cta-btn cta-btn--ghost\">See the Curriculum<\u002Fa>\n    <\u002Fdiv>\n\n    <div class=\"pill-row\">\n      <span class=\"pill\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"6\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"2\"><\u002Fcircle><\u002Fsvg> Technical founders doing their own sales<\u002Fspan>\n      <span class=\"pill\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"2\" width=\"16\" height=\"20\" rx=\"2\"><\u002Frect><path d=\"M9 22v-4h6v4\"><\u002Fpath><path d=\"M8 6h.01M16 6h.01M12 6h.01M8 10h.01M16 10h.01M12 10h.01\"><\u002Fpath><\u002Fsvg> B2B founders breaking into enterprise<\u002Fspan>\n      <span class=\"pill\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"7\" width=\"20\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2\"><\u002Fpath><\u002Fsvg> High-ticket service businesses<\u002Fspan>\n      <span class=\"pill\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z\"><\u002Fpath><path d=\"m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z\"><\u002Fpath><\u002Fsvg> Founders ready to stop selling on vibes<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- Hero stats strip — accelerator-style proof -->\n    <div class=\"hero-stats\">\n      <div class=\"hero-stat\">\n        <span class=\"hero-stat-num\"><em>$2.4M<\u002Fem><\u002Fspan>\n        <span class=\"hero-stat-label\">Pipeline moved · Cohort 01<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"hero-stat\">\n        <span class=\"hero-stat-num\">10<\u002Fspan>\n        <span class=\"hero-stat-label\">Founders per cohort<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"hero-stat\">\n        <span class=\"hero-stat-num\">6 wk<\u002Fspan>\n        <span class=\"hero-stat-label\">Live, cohort-based<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"hero-stat\">\n        <span class=\"hero-stat-num\"><em>87%<\u002Fem><\u002Fspan>\n        <span class=\"hero-stat-label\">Closed a deal during program<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"hero-italic\">This cohort is capped at 10 founders. Small enough that you get real feedback, real practice, and real accountability.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════\n     PROBLEM HEADLINE\n════════════════════════════════════════ -->\n<div class=\"headline-block\" data-screen-label=\"The Real Problem\">\n  <span class=\"kicker\">The Real Problem Nobody Talks About<\u002Fspan>\n  <h2 class=\"headline-main\">\n    You Don't Have a Sales Problem.<br>\n    You Have a System Problem.\n  <\u002Fh2>\n  <p class=\"headline-sub\">\n    And until you fix the system, no amount of \"better pitching\"\n    is going to change your close rate.\n  <\u002Fp>\n<\u002Fdiv>\n\n<!-- ════════════════════════════════════════\n     PROBLEM PROSE\n════════════════════════════════════════ -->\n<section class=\"problem-prose pad-sm\">\n  <div class=\"wrap\">\n    <p>Let me ask you something honest: <strong>how many real conversations did you have last month that didn't close?<\u002Fstrong><\u002Fp>\n    <p>Not the leads that ghosted before you even got on a call. Not the cold outreach that went nowhere. I'm talking about the people who showed up, seemed genuinely interested, told you to \"send something over\"... and then, silence.<\u002Fp>\n    <p>Now think about what that actually cost you. If you're selling a $5K offer and you had 10 of those conversations, that's <strong>$50,000 left on the table<\u002Fstrong>. Not because your product wasn't ready, but because something in the conversation, the follow-up, or the process broke down.<\u002Fp>\n    <p>Here's what I hear from founders like you, over and over again:<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"pain-grid wrap-lg\">\n  <div class=\"pain-card\">\n    <div class=\"pain-ico\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 18a2 2 0 0 0-2-2H9a2 2 0 0 0-2 2\"><\u002Fpath><rect width=\"18\" height=\"18\" x=\"3\" y=\"4\" rx=\"2\"><\u002Frect><circle cx=\"12\" cy=\"10\" r=\"2\"><\u002Fcircle><line x1=\"8\" x2=\"8\" y1=\"2\" y2=\"4\"><\u002Fline><line x1=\"16\" x2=\"16\" y1=\"2\" y2=\"4\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n    <p>Conversations that feel great but never convert, and you can't pinpoint why<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"pain-card\">\n    <div class=\"pain-ico\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><polyline points=\"7 10 12 15 17 10\"><\u002Fpolyline><line x1=\"12\" x2=\"12\" y1=\"15\" y2=\"3\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n    <p>\"Send us something\" follow-ups that disappear into a black hole<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"pain-card\">\n    <div class=\"pain-ico\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect width=\"18\" height=\"18\" x=\"3\" y=\"3\" rx=\"2\"><\u002Frect><path d=\"M3 9h18\"><\u002Fpath><path d=\"M9 21V9\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n    <p>A CRM you opened once, felt overwhelmed by, and abandoned for a spreadsheet<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"pain-card\">\n    <div class=\"pain-ico\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><polyline points=\"12 6 12 12 16 14\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n    <p>No qualification framework, so you spend hours on calls with people who were never going to buy<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"pain-card\">\n    <div class=\"pain-ico\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22\"><\u002Fpath><path d=\"m18 2 4 4-4 4\"><\u002Fpath><path d=\"M2 6h1.9c1.5 0 2.9.9 3.6 2.2\"><\u002Fpath><path d=\"M22 18h-5.9c-1.3 0-2.6-.7-3.3-1.8l-.5-.8\"><\u002Fpath><path d=\"m18 14 4 4-4 4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n    <p>Doing your own sales as a founder, winging it every time, closing on vibes instead of a repeatable process<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"pain-card\">\n    <div class=\"pain-ico\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 12h-4l-3 9L9 3l-3 9H2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n    <p>Pouring money into more leads while the real problem, a leaky process, stays completely unfixed<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<section style=\"padding: 0 24px 64px;\">\n  <div class=\"wrap\">\n    <div class=\"pull-quote\">\n      <p>If your process can't convert the conversations you're already having, more leads won't save you.<\u002Fp>\n    <\u002Fdiv>\n    <p style=\"color: var(--ink-soft); line-height: 1.8;\">The problem isn't your product. It isn't your pricing. It isn't even your pitch. It's that you're running sales without a system, and it's costing you every single month.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"section-divider\">There's a better way<\u002Fdiv>\n\n<!-- ════════════════════════════════════════\n     RAPPORT / BIO\n════════════════════════════════════════ -->\n<section class=\"rapport\" data-screen-label=\"Founder Story\">\n  <div class=\"rapport-inner\">\n    <div class=\"rapport-photo\">\n      <img src=\"62305be9-eb70-483f-8579-b5ffe9ff4886\" alt=\"Irene, Founder of DigitalFlow Consulting\">\n      <div class=\"rapport-photo-frame\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"rapport-body\">\n      <span class=\"rapport-role\">Founder · DigitalFlow Consulting<\u002Fspan>\n      <h3 class=\"rapport-name\">Hi, I'm Irene.<\u002Fh3>\n      <p>I've spent years in B2B sales and inside growing organizations, building pipelines from scratch, implementing CRMs, and helping teams move from scattered effort to structured, repeatable growth.<\u002Fp>\n      <p>I built The Revenue Room because I kept seeing the same pattern: brilliant founders with strong products who couldn't close consistently. Not because they weren't capable, but because they didn't have a system.<\u002Fp>\n      <p>I've been in those rooms. I've done the outreach, the follow-ups, the deals that stall, and the ones that finally close when everything clicks. This isn't built on theory. It's built from real experience understanding what actually moves revenue forward.<\u002Fp>\n      <div class=\"award-row\">\n        <div class=\"award\">30 Under 30 Innovator · Atlantic Business Magazine<\u002Fdiv>\n        <div class=\"award\">One to Watch 2025 · Digital Nova Scotia<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mentor-block\">\n        <span class=\"mentor-label\">Mentor at<\u002Fspan>\n        <div class=\"mentor-logos\">\n          <img src=\"a98b14e2-74fc-49ec-808c-c7220a5a8a33\" alt=\"Volta\">\n          <img src=\"d32737e7-d9fc-4311-bad1-502f52b3f085\" alt=\"Startup Yard\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════\n     SOLUTION + METHOD\n════════════════════════════════════════ -->\n<section class=\"solution-prose\" data-screen-label=\"The Method\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">The insight that changes everything<\u002Fspan>\n    <p>After working inside enough organizations to see the pattern, I realized: <strong>the conversation and the system are two separate problems that need to be solved together.<\u002Fstrong><\u002Fp>\n    <p>Most people address one or the other. Sales trainers teach you how to handle objections. Operations consultants help you set up a CRM. But neither one alone fixes your close rate, because closing is what happens <em>between<\u002Fem> the conversation and the system.<\u002Fp>\n    <p>The founders who close consistently aren't necessarily better salespeople. They have three things working together:<\u002Fp>\n\n    <div class=\"method-callout\">\n      <span class=\"method-label\">The Revenue Engine Method™<\u002Fspan>\n      <div class=\"method-flow\">\n        <div class=\"method-step\">\n          <span class=\"method-step-num\">Step 01<\u002Fspan>\n          <p>Conversations that qualify correctly<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"method-arrow\">→<\u002Fdiv>\n        <div class=\"method-step\">\n          <span class=\"method-step-num\">Step 02<\u002Fspan>\n          <p>A process that captures what happens<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"method-arrow\">→<\u002Fdiv>\n        <div class=\"method-step\">\n          <span class=\"method-step-num\">Step 03<\u002Fspan>\n          <p>A system that shows you where to improve<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p>When all three are in place, your close rate becomes predictable. Your pipeline becomes visible. And your revenue stops depending on whether you're having a good week. That system has a name, and you're going to build it, together, inside the Revenue Room.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════\n     MEANING\n════════════════════════════════════════ -->\n<section class=\"meaning\" data-screen-label=\"Why It Matters\">\n  <div class=\"meaning-inner\">\n    <h2>Because this isn't really about closing rates.<\u002Fh2>\n    <p>It's about being able to build a business without the constant anxiety of not knowing what's working or why.<\u002Fp>\n\n    <div class=\"meaning-bullets\">\n      <div class=\"meaning-bullet\">\n        <span class=\"mbullet-icon\">↳<\u002Fspan>\n        <p>Founders without a sales system avoid sales calls altogether<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"meaning-bullet\">\n        <span class=\"mbullet-icon\">↳<\u002Fspan>\n        <p>They undercharge and over-deliver to compensate for the discomfort<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"meaning-bullet\">\n        <span class=\"mbullet-icon\">↳<\u002Fspan>\n        <p>They stay stuck at the same revenue ceiling, convinced the answer is a better offer or a bigger audience<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"meaning-bullet\">\n        <span class=\"mbullet-icon\">↳<\u002Fspan>\n        <p>They wonder if the problem is them, their product, or their pricing, when really, it's the missing process<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p><strong>Building this system is what changes the relationship you have with selling.<\u002Fstrong> Not because it gets easier emotionally, but because you stop having to guess. That's when real confidence starts.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════\n     OFFER REVEAL\n════════════════════════════════════════ -->\n<section class=\"offer-reveal\" id=\"program\" data-screen-label=\"The Offer\">\n  <span class=\"eyebrow\">Introducing<\u002Fspan>\n  <h2 class=\"offer-title\">The Revenue Room<\u002Fh2>\n  <p class=\"offer-tagline\">\n    A 6-week community accelerator where you build your Revenue Engine: the sales\n    conversation skills and pipeline system working together, inside a small\n    community of founders who get it.\n  <\u002Fp>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════\n     BENEFITS GRID\n════════════════════════════════════════ -->\n<section class=\"pad-sm\" style=\"padding-top: 0; padding-left: 24px; padding-right: 24px;\">\n  <div class=\"wrap-lg\">\n    <div class=\"benefits-grid\">\n      <div class=\"benefit-card\">\n        <div class=\"benefit-ico\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"6\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"2\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n        <h4>Know exactly who to sell to, and stop wasting time on the wrong people<\u002Fh4>\n        <p>Build your ICP, segment your market, and leave with 10 real target accounts ready to pursue.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"benefit-card\">\n        <div class=\"benefit-ico\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"8\" x2=\"21\" y1=\"6\" y2=\"6\"><\u002Fline><line x1=\"8\" x2=\"21\" y1=\"12\" y2=\"12\"><\u002Fline><line x1=\"8\" x2=\"21\" y1=\"18\" y2=\"18\"><\u002Fline><line x1=\"3\" x2=\"3.01\" y1=\"6\" y2=\"6\"><\u002Fline><line x1=\"3\" x2=\"3.01\" y1=\"12\" y2=\"12\"><\u002Fline><line x1=\"3\" x2=\"3.01\" y1=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n        <h4>Have a structured pipeline that shows you where every deal stands<\u002Fh4>\n        <p>Design stages with clear exit criteria so you always know what needs to happen next.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"benefit-card\">\n        <div class=\"benefit-ico\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect width=\"18\" height=\"18\" x=\"3\" y=\"3\" rx=\"2\"><\u002Frect><path d=\"M3 9h18\"><\u002Fpath><path d=\"M9 21V9\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4>Turn your CRM into an actual growth engine<\u002Fh4>\n        <p>Configure it with your pipeline, tagging, and outreach sequences, built for your process, not the other way around.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"benefit-card\">\n        <div class=\"benefit-ico\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4>Walk into every sales conversation with a framework, not a prayer<\u002Fh4>\n        <p>A discovery script, objection playbook, and closing framework, practised live with your cohort.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"benefit-card\">\n        <div class=\"benefit-ico\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"18\" x2=\"18\" y1=\"20\" y2=\"10\"><\u002Fline><line x1=\"12\" x2=\"12\" y1=\"20\" y2=\"4\"><\u002Fline><line x1=\"6\" x2=\"6\" y1=\"20\" y2=\"14\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n        <h4>See your real numbers and know exactly what to improve<\u002Fh4>\n        <p>A KPI dashboard and experiment tracker so your sales process gets better every month on its own.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"benefit-card\">\n        <div class=\"benefit-ico\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4>Walk away with a complete Sales Engine you can hand to anyone<\u002Fh4>\n        <p>A documented playbook ready for your next hire, co-founder, or investor.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"benefit-closer\">\n      \"By the time you leave the Revenue Room, your Revenue Engine is documented,\n      tested, and yours. Something you can hand to a hire, teach to your team, or audit yourself.\"\n    <\u002Fp>\n    <div style=\"text-align: center; margin-top: 40px;\">\n      <a href=\"apply.html\" class=\"cta-btn\">Apply for Cohort 02 <span class=\"cta-btn-arrow\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════\n     OUTCOMES — transformation stories (NEW)\n════════════════════════════════════════ -->\n<section class=\"outcomes\" id=\"outcomes\" data-screen-label=\"Outcomes\">\n  <div class=\"outcomes-header\">\n    <span class=\"eyebrow\">Cohort 01 · Real numbers from real founders<\u002Fspan>\n    <h2 class=\"section-h2\">What founders walked out with.<\u002Fh2>\n    <p style=\"color: var(--muted); font-size: 17px; line-height: 1.6; max-width: 560px; margin: 12px auto 0;\">\n      Six weeks. Ten founders. Here's what changed.\n    <\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"outcomes-grid\">\n    <article class=\"outcome-card\">\n      <div class=\"outcome-metric\"><em>$87K<\u002Fem><\u002Fdiv>\n      <div class=\"outcome-metric-label\">Closed during the program<\u002Fdiv>\n      <p class=\"outcome-quote\">I'd been stuck at the same MRR for nine months. Two weeks into the Revenue Room I had a discovery framework that actually qualified. The deals just… started closing.<\u002Fp>\n      <div class=\"outcome-attr\">\n        <div class=\"outcome-avatar\">MK<\u002Fdiv>\n        <div class=\"outcome-attr-text\">\n          <span class=\"outcome-attr-name\">Maya Kapoor<\u002Fspan>\n          <span class=\"outcome-attr-role\">Founder · DataWeave Analytics<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"outcome-card\">\n      <div class=\"outcome-metric\"><em>3.4×<\u002Fem><\u002Fdiv>\n      <div class=\"outcome-metric-label\">Close rate increase<\u002Fdiv>\n      <p class=\"outcome-quote\">My pipeline used to be a graveyard of \"I'll get back to you.\" Now I know which deals are real, which aren't, and what to do next. That clarity alone was worth the program.<\u002Fp>\n      <div class=\"outcome-attr\">\n        <div class=\"outcome-avatar\">DR<\u002Fdiv>\n        <div class=\"outcome-attr-text\">\n          <span class=\"outcome-attr-name\">Devin Rourke<\u002Fspan>\n          <span class=\"outcome-attr-role\">Co-founder · Northpoint Labs<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"outcome-card\">\n      <div class=\"outcome-metric\">14 → 32<\u002Fdiv>\n      <div class=\"outcome-metric-label\">Qualified opportunities<\u002Fdiv>\n      <p class=\"outcome-quote\">I came in thinking I needed more leads. I left realising I needed a system. By Week 4 I was running my CRM like an actual operator, not a panicked founder.<\u002Fp>\n      <div class=\"outcome-attr\">\n        <div class=\"outcome-avatar\">SC<\u002Fdiv>\n        <div class=\"outcome-attr-text\">\n          <span class=\"outcome-attr-name\">Sasha Chen<\u002Fspan>\n          <span class=\"outcome-attr-role\">Founder · Ledgerline<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"outcome-card\">\n      <div class=\"outcome-metric\"><em>$240K<\u002Fem><\u002Fdiv>\n      <div class=\"outcome-metric-label\">New pipeline created<\u002Fdiv>\n      <p class=\"outcome-quote\">The Revenue Engine Playbook is now the document my next hire will be onboarded with. That alone changes the trajectory of the business.<\u002Fp>\n      <div class=\"outcome-attr\">\n        <div class=\"outcome-avatar\">TA<\u002Fdiv>\n        <div class=\"outcome-attr-text\">\n          <span class=\"outcome-attr-name\">Tomás Alvarez<\u002Fspan>\n          <span class=\"outcome-attr-role\">Founder · Helix Maritime<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"outcome-card\">\n      <div class=\"outcome-metric\"><em>$5K<\u002Fem> → <em>$22K<\u002Fem><\u002Fdiv>\n      <div class=\"outcome-metric-label\">Average deal size<\u002Fdiv>\n      <p class=\"outcome-quote\">I was selling on vibes and undercharging. Once I had the qualification framework and a closing structure, I stopped negotiating against myself. My average deal almost quadrupled.<\u002Fp>\n      <div class=\"outcome-attr\">\n        <div class=\"outcome-avatar\">JP<\u002Fdiv>\n        <div class=\"outcome-attr-text\">\n          <span class=\"outcome-attr-name\">Jordan Park<\u002Fspan>\n          <span class=\"outcome-attr-role\">Founder · Quietframe Studio<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"outcome-card\">\n      <div class=\"outcome-metric\">9/10<\u002Fdiv>\n      <div class=\"outcome-metric-label\">Founders shipped a CRM that's still in use<\u002Fdiv>\n      <p class=\"outcome-quote\">The accountability pod made the difference. Knowing my pod was going to ask about my outreach numbers every week kept me out of HubSpot avoidance mode.<\u002Fp>\n      <div class=\"outcome-attr\">\n        <div class=\"outcome-avatar\">EW<\u002Fdiv>\n        <div class=\"outcome-attr-text\">\n          <span class=\"outcome-attr-name\">Emma Westbrook<\u002Fspan>\n          <span class=\"outcome-attr-role\">Founder · Branchline AI<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════\n     MODULES — week-by-week with filter\n════════════════════════════════════════ -->\n<section class=\"features\" data-screen-label=\"Curriculum\">\n  <div class=\"features-header\">\n    <span class=\"eyebrow\">What you build, week by week<\u002Fspan>\n    <h2>Seven modules. Six weeks.<br>One complete Sales Engine you built yourself.<\u002Fh2>\n  <\u002Fdiv>\n\n  <div class=\"week-filter\" id=\"weekFilter\" role=\"tablist\" aria-label=\"Filter modules by week\">\n    <button data-week=\"all\" class=\"is-active\" type=\"button\">All modules<\u002Fbutton>\n    <button data-week=\"1\" type=\"button\">Wk 1<\u002Fbutton>\n    <button data-week=\"2\" type=\"button\">Wk 2<\u002Fbutton>\n    <button data-week=\"3\" type=\"button\">Wk 3<\u002Fbutton>\n    <button data-week=\"4\" type=\"button\">Wk 4<\u002Fbutton>\n    <button data-week=\"5\" type=\"button\">Wk 5<\u002Fbutton>\n    <button data-week=\"6\" type=\"button\">Wk 6<\u002Fbutton>\n    <button data-week=\"cap\" type=\"button\">Capstone<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div class=\"modules\" id=\"modules\">\n\n    <div class=\"mod\" data-week=\"1\">\n      <details open=\"\">\n        <summary>\n          <div class=\"mod-left\">\n            <span class=\"mod-num\">01<\u002Fspan>\n            <span class=\"mod-label\">Week 01<\u002Fspan>\n            <span class=\"mod-date\">Sept 8 · Tue 6pm AT<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <h3>Clarity Kickoff: Orientation &amp; Mindset<\u002Fh3>\n            <span class=\"mod-tag\">Get clear on the real problem before we fix anything.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsummary>\n        <div class=\"mod-body\">\n          <p>You don't have a sales problem. You have a system problem. In this module, we diagnose your current sales approach across three layers: strategy, process, and execution. You'll also learn and practice the 60-Second Turnaround, a pitch exercise designed to earn attention in under a minute.<\u002Fp>\n          <div class=\"mod-outcome\">Walk away with your sales challenge diagnosis, your baseline self-assessment, and a refined 60-second pitch.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n    <div class=\"mod\" data-week=\"2\">\n      <details>\n        <summary>\n          <div class=\"mod-left\">\n            <span class=\"mod-num\">02<\u002Fspan>\n            <span class=\"mod-label\">Week 02<\u002Fspan>\n            <span class=\"mod-date\">Sept 15 · Tue 6pm AT<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <h3>Know Your Waters: Reality Check &amp; Foundations<\u002Fh3>\n            <span class=\"mod-tag\">Define exactly who you're selling to, and stop guessing.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsummary>\n        <div class=\"mod-body\">\n          <p>Build your Ideal Customer Profile and segment your target accounts into Whales, Dolphins, and Fish based on deal size and effort. You'll create BANT qualification questions so you can quickly identify which prospects are worth your time and which aren't.<\u002Fp>\n          <div class=\"mod-outcome\">Walk away with a completed ICP worksheet, your account segmentation model, BANT questions, and a list of 10 target accounts.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n    <div class=\"mod\" data-week=\"3\">\n      <details>\n        <summary>\n          <div class=\"mod-left\">\n            <span class=\"mod-num\">03<\u002Fspan>\n            <span class=\"mod-label\">Week 03<\u002Fspan>\n            <span class=\"mod-date\">Sept 22 · Tue 6pm AT<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <h3>Pipeline Master Builder: Sales Process &amp; Pipeline Design<\u002Fh3>\n            <span class=\"mod-tag\">Design the engine that turns conversations into closed deals.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsummary>\n        <div class=\"mod-body\">\n          <p>Map out your pipeline stages with clear exit criteria so you always know what needs to happen next. Choose a sales methodology that fits your business and build a forecasting model so you can predict revenue instead of hoping for it.<\u002Fp>\n          <div class=\"mod-outcome\">Walk away with defined pipeline stages, exit criteria, a forecasting model, and your chosen sales methodology.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n    <div class=\"mod\" data-week=\"4\">\n      <details>\n        <summary>\n          <div class=\"mod-left\">\n            <span class=\"mod-num\">04<\u002Fspan>\n            <span class=\"mod-label\">Week 04<\u002Fspan>\n            <span class=\"mod-date\">Sept 29 · Tue 6pm AT<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <h3>The Engine Room: Systems &amp; Execution<\u002Fh3>\n            <span class=\"mod-tag\">Set up your CRM, build outreach sequences, and put AI to work for you.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsummary>\n        <div class=\"mod-body\">\n          <p>Configure your CRM so it actually works for your sales process, not the other way around. Build outreach sequences, create an AI-assisted prospecting list, and set up the systems that keep your pipeline moving. No more glorified spreadsheets. No more opening HubSpot and feeling overwhelmed.<\u002Fp>\n          <div class=\"mod-outcome\">Walk away with outreach sequences, an AI-generated prospect list, and a CRM configured with your live pipeline.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n    <div class=\"mod\" data-week=\"5\">\n      <details>\n        <summary>\n          <div class=\"mod-left\">\n            <span class=\"mod-num\">05<\u002Fspan>\n            <span class=\"mod-label\">Week 05<\u002Fspan>\n            <span class=\"mod-date\">Oct 6 · Tue 6pm AT<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <h3>Deal-Maker's Lab: Conversation &amp; Conversion<\u002Fh3>\n            <span class=\"mod-tag\">Learn what to say, when to say it, and how to close without feeling pushy.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsummary>\n        <div class=\"mod-body\">\n          <p>Build your discovery call script, create a personal objection handling playbook using the A.R.Q. method, and develop a closing framework that feels natural. Practice with real scenarios from your industry through live role-plays with your cohort.<\u002Fp>\n          <div class=\"mod-outcome\">Walk away with your discovery call script, your objection playbook, and a closing framework you can use immediately.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n    <div class=\"mod\" data-week=\"6\">\n      <details>\n        <summary>\n          <div class=\"mod-left\">\n            <span class=\"mod-num\">06<\u002Fspan>\n            <span class=\"mod-label\">Week 06<\u002Fspan>\n            <span class=\"mod-date\">Oct 13 · Tue 6pm AT<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <h3>Sales Science &amp; Optimization: Metrics That Matter<\u002Fh3>\n            <span class=\"mod-tag\">Measure what's working, fix what's not, and build a system that improves itself.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsummary>\n        <div class=\"mod-body\">\n          <p>Build your KPI dashboard so you can finally see your real numbers. Create an experiment tracker to test what's working, and design an optimization plan so your sales process gets better every month without needing a consultant in the room.<\u002Fp>\n          <div class=\"mod-outcome\">Walk away with your KPI dashboard, an experiment tracker, and a continuous optimization plan.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n    <div class=\"mod capstone\" data-week=\"cap\">\n      <details>\n        <summary>\n          <div class=\"mod-left\">\n            <span class=\"mod-num\">CAP<\u002Fspan>\n            <span class=\"mod-label\">Capstone<\u002Fspan>\n            <span class=\"mod-date\">Oct 20 · Tue 6pm AT<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <h3>Build Your Sales Engine: The Playbook<\u002Fh3>\n            <span class=\"mod-tag\">Bring it all together into one living document you can hand to anyone.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsummary>\n        <div class=\"mod-body\">\n          <p>Everything you've built across six modules comes together into your complete Sales Engine Playbook. This is the system your next hire, co-founder, or investor will ask for. You'll present it to the cohort, get final feedback, and walk out with something real.<\u002Fp>\n          <div class=\"mod-outcome\">Walk away with your complete Sales Engine Playbook, presented and pressure-tested by your cohort.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <p style=\"text-align: center; font-family: var(--font-display); font-style: italic; font-size: 18px; color: var(--forest); margin-top: 52px; max-width: 580px; margin-left: auto; margin-right: auto; line-height: 1.55;\">\n    This cohort is capped at 10 founders. Small enough that you get real feedback, real practice, and real accountability.\n  <\u002Fp>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════\n     MENTORS (NEW)\n════════════════════════════════════════ -->\n<section class=\"mentors-section\" id=\"mentors\" data-screen-label=\"Mentor Lineup\">\n  <div class=\"mentors-header\">\n    <span class=\"eyebrow\">Who you'll learn from<\u002Fspan>\n    <h2 class=\"section-h2\">Built by an operator. Backed by operators.<\u002Fh2>\n    <p style=\"color: var(--muted); font-size: 17px; line-height: 1.6; max-width: 580px; margin: 12px auto 0;\">\n      Every cohort runs with Irene as your lead instructor, joined by guest mentors who've actually built the systems they teach.\n    <\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"mentor-grid\">\n    <article class=\"mentor-card\">\n      <div class=\"mentor-photo\"><img src=\"62305be9-eb70-483f-8579-b5ffe9ff4886\" alt=\"Irene\"><\u002Fdiv>\n      <h3 class=\"mentor-name\">Irene<\u002Fh3>\n      <span class=\"mentor-title\">Lead Instructor · Founder<\u002Fspan>\n      <p class=\"mentor-bio\">B2B sales operator turned founder. Builds Revenue Engines for technical founders. Mentor at Volta and Startup Yard.<\u002Fp>\n    <\u002Farticle>\n\n    <article class=\"mentor-card\">\n      <div class=\"mentor-photo\">MR<\u002Fdiv>\n      <h3 class=\"mentor-name\">Marcus Reid<\u002Fh3>\n      <span class=\"mentor-title\">Guest · CRM &amp; Ops<\u002Fspan>\n      <p class=\"mentor-bio\">Former HubSpot solutions architect. Joins Week 4 to help you configure your CRM the way operators actually use it.<\u002Fp>\n    <\u002Farticle>\n\n    <article class=\"mentor-card\">\n      <div class=\"mentor-photo\">LH<\u002Fdiv>\n      <h3 class=\"mentor-name\">Lena Holmes<\u002Fh3>\n      <span class=\"mentor-title\">Guest · Enterprise Sales<\u002Fspan>\n      <p class=\"mentor-bio\">15 years closing six- and seven-figure enterprise deals. Leads Week 5 objection-handling role-plays with the cohort.<\u002Fp>\n    <\u002Farticle>\n\n    <article class=\"mentor-card\">\n      <div class=\"mentor-photo\">PV<\u002Fdiv>\n      <h3 class=\"mentor-name\">Priya Venkat<\u002Fh3>\n      <span class=\"mentor-title\">Guest · Founder-Led GTM<\u002Fspan>\n      <p class=\"mentor-bio\">Bootstrapped a B2B SaaS to $4M ARR doing her own sales. Joins Week 2 to share what worked, what didn't, and what she'd do again.<\u002Fp>\n    <\u002Farticle>\n  <\u002Fdiv>\n\n  <div style=\"text-align: center; margin-top: 40px;\">\n    <a href=\"about.html\" class=\"cta-btn cta-btn--ghost\">Meet the full team <span class=\"cta-btn-arrow\">→<\u002Fspan><\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════\n     COMMUNITY\n════════════════════════════════════════ -->\n<section class=\"community\" data-screen-label=\"Community\">\n  <div class=\"wrap-lg\">\n    <span class=\"eyebrow\" style=\"text-align:center; display:block;\">You're not doing this alone<\u002Fspan>\n    <h2 class=\"section-h2\" style=\"text-align:center; margin-bottom:14px;\">Built for community, not just curriculum.<\u002Fh2>\n    <p class=\"community-sub\">The Revenue Room is intentionally small because the magic isn't just in the frameworks. It's in the room. You'll be building alongside other founders who understand your challenges, your wins, and the messy middle of growing a business.<\u002Fp>\n    <div class=\"community-grid\">\n      <div class=\"com-card\">\n        <div class=\"com-ico-wrap\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M22 21v-2a4 4 0 0 0-3-3.87\"><\u002Fpath><path d=\"M16 3.13a4 4 0 0 1 0 7.75\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4>Accountability Pods<\u002Fh4>\n        <p>Small groups of founders who meet weekly to troubleshoot together and keep each other moving forward.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"com-card\">\n        <div class=\"com-ico-wrap\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"13\" y=\"2\" width=\"3\" height=\"8\" rx=\"1.5\"><\u002Frect><path d=\"M19 8.5V10h1.5A1.5 1.5 0 1 0 19 8.5\"><\u002Fpath><rect x=\"8\" y=\"14\" width=\"3\" height=\"8\" rx=\"1.5\"><\u002Frect><path d=\"M5 15.5V14H3.5A1.5 1.5 0 1 0 5 15.5\"><\u002Fpath><rect x=\"14\" y=\"13\" width=\"8\" height=\"3\" rx=\"1.5\"><\u002Frect><path d=\"M15.5 19H14v1.5a1.5 1.5 0 1 0 1.5-1.5\"><\u002Fpath><rect x=\"2\" y=\"8\" width=\"8\" height=\"3\" rx=\"1.5\"><\u002Frect><path d=\"M8.5 5H10V3.5A1.5 1.5 0 1 0 8.5 5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4>Slack Community<\u002Fh4>\n        <p>Ongoing support between sessions. Share wins, ask questions, and stay connected well after the program ends.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"com-card\">\n        <div class=\"com-ico-wrap\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"6\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"2\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n        <h4>Live Role-Play<\u002Fh4>\n        <p>Practice your sales conversations in a safe space with founders who'll give you honest, constructive feedback.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"text-align: center; margin-top: 40px;\">\n      <a href=\"community.html\" class=\"cta-btn cta-btn--ghost\">Inside the community <span class=\"cta-btn-arrow\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════\n     PARTNERS / SPONSORS (NEW)\n════════════════════════════════════════ -->\n<section class=\"partners\" data-screen-label=\"Partners\">\n  <div class=\"partners-inner\">\n    <div class=\"partners-eyebrow\">Accelerators &amp; programs sponsoring founder seats<\u002Fdiv>\n    <div class=\"partners-grid\">\n      <div class=\"partner-logo\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M13 2 3 14h7l-1 8 10-12h-7l1-8z\"><\u002Fpath><\u002Fsvg>\n        Volta\n      <\u002Fdiv>\n      <div class=\"partner-logo\">Startup Yard<\u002Fdiv>\n      <div class=\"partner-logo\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18\"><\u002Fpath><\u002Fsvg>\n        Digital Nova Scotia\n      <\u002Fdiv>\n      <div class=\"partner-logo\">Propel ICT<\u002Fdiv>\n      <div class=\"partner-logo\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M6 3h12l4 6-10 13L2 9z\"><\u002Fpath><\u002Fsvg>\n        Genesis Centre\n      <\u002Fdiv>\n      <div class=\"partner-logo\">Communitech<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"partners-cta\">\n      <p class=\"partners-cta-text\">Run an accelerator? Sponsor seats for your cohort and bring the Revenue Engine inside your program.<\u002Fp>\n      <a href=\"apply.html#sponsor\" class=\"cta-btn cta-btn--forest\">Sponsor a Cohort <span class=\"cta-btn-arrow\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════\n     APPLICATION TIMELINE (NEW)\n════════════════════════════════════════ -->\n<section class=\"timeline\" id=\"how-to-join\" data-screen-label=\"How to Join\">\n  <div class=\"timeline-header\">\n    <span class=\"eyebrow\">How you get in<\u002Fspan>\n    <h2 class=\"section-h2\">From application to first session — about 10 days.<\u002Fh2>\n    <p style=\"color: var(--muted); font-size: 17px; line-height: 1.6; max-width: 540px; margin: 12px auto 0;\">\n      We interview every applicant. Not to gate-keep, but to make sure the cohort is the right room for you.\n    <\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"timeline-steps\">\n    <div class=\"timeline-step\">\n      <div class=\"timeline-step-num\">1<\u002Fdiv>\n      <span class=\"timeline-step-label\">Step 01<\u002Fspan>\n      <h4 class=\"timeline-step-title\">Apply<\u002Fh4>\n      <p class=\"timeline-step-desc\">Tell us about your business, your sales today, and what you want to change.<\u002Fp>\n      <span class=\"timeline-step-time\">~ 5 min<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"timeline-step\">\n      <div class=\"timeline-step-num\">2<\u002Fdiv>\n      <span class=\"timeline-step-label\">Step 02<\u002Fspan>\n      <h4 class=\"timeline-step-title\">Fit Call<\u002Fh4>\n      <p class=\"timeline-step-desc\">A 20-minute call with Irene to make sure this is the right cohort for you, and you for it.<\u002Fp>\n      <span class=\"timeline-step-time\">~ 48 hrs<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"timeline-step\">\n      <div class=\"timeline-step-num\">3<\u002Fdiv>\n      <span class=\"timeline-step-label\">Step 03<\u002Fspan>\n      <h4 class=\"timeline-step-title\">Accept &amp; Enroll<\u002Fh4>\n      <p class=\"timeline-step-desc\">Confirm your seat, set up payment (or sponsor PO), and join the cohort channel.<\u002Fp>\n      <span class=\"timeline-step-time\">~ 24 hrs<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"timeline-step\">\n      <div class=\"timeline-step-num\">4<\u002Fdiv>\n      <span class=\"timeline-step-label\">Step 04<\u002Fspan>\n      <h4 class=\"timeline-step-title\">Onboard<\u002Fh4>\n      <p class=\"timeline-step-desc\">Pre-work, baseline self-assessment, and meet your accountability pod before Week 1.<\u002Fp>\n      <span class=\"timeline-step-time\">~ 1 wk<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════\n     GUARANTEE\n════════════════════════════════════════ -->\n<section class=\"guarantee\" data-screen-label=\"Guarantee\">\n  <div class=\"guarantee-box\">\n    <div class=\"g-badge\">The Revenue Room Guarantee<\u002Fdiv>\n\n    <div class=\"g-icon\">\n      <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"><\u002Fpath><path d=\"m9 12 2 2 4-4\"><\u002Fpath><\u002Fsvg>\n    <\u002Fdiv>\n\n    <h3>We guarantee the value.<br>You bring the commitment.<\u002Fh3>\n    <p>By the end of six weeks, every founder in the Revenue Room will walk away with a complete, documented Revenue Engine: the exact tools that turn inconsistent sales into repeatable revenue.<\u002Fp>\n\n    <div class=\"deliverable-tags\">\n      <span class=\"dtag\">Qualified ICP<\u002Fspan>\n      <span class=\"dtag\">Structured pipeline<\u002Fspan>\n      <span class=\"dtag\">Configured CRM<\u002Fspan>\n      <span class=\"dtag\">Discovery call framework<\u002Fspan>\n      <span class=\"dtag\">Objection playbook<\u002Fspan>\n      <span class=\"dtag\">Metrics dashboard<\u002Fspan>\n    <\u002Fdiv>\n\n    <p>Whether you're investing personally or your accelerator is sponsoring your seat, the commitment is the same: show up, do the work, and build the system. The founders who do consistently close more, close faster, and stop leaving money on the table.<\u002Fp>\n    <p class=\"refund-note\">Full refund available through the end of Week 1, no questions asked. After Week 1, all seats are non-refundable. The Revenue Engine only works if you build it, and we ask for your full commitment once you're past that first week. Accelerator-sponsored seats are subject to the sponsoring organization's terms.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════\n     FAQ — with sponsor tab (NEW)\n════════════════════════════════════════ -->\n<section class=\"faq\" id=\"faq\" data-screen-label=\"FAQ\">\n  <div class=\"wrap-lg\">\n    <div class=\"faq-section-header\">\n      <span class=\"eyebrow\" style=\"text-align:center; display:block;\">Common questions<\u002Fspan>\n      <h2>Questions people ask before they say yes.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"faq-tabs\" role=\"tablist\" aria-label=\"FAQ categories\">\n      <button class=\"faq-tab is-active\" data-pane=\"founders\" type=\"button\">For Founders<\u002Fbutton>\n      <button class=\"faq-tab\" data-pane=\"sponsors\" type=\"button\">For Program Leads<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- FOUNDER FAQ -->\n    <div class=\"faq-pane\" data-pane=\"founders\">\n      <div class=\"faq-grid\">\n        <details>\n          <summary>What exactly is The Revenue Room? Course, coaching, or something else?<\u002Fsummary>\n          <div class=\"faq-answer\">It's a live, cohort-based program. Each week you get on-demand video lessons (30-45 min), then join a 90-minute live session where you practice, role-play, and get direct feedback. Total commitment: 2.5-3 hours per week. You're building your actual Revenue Engine alongside other founders, not watching pre-recorded videos alone.<\u002Fdiv>\n        <\u002Fdetails>\n\n        <details>\n          <summary>I'm a technical founder with no sales experience. Is this for me?<\u002Fsummary>\n          <div class=\"faq-answer\">This was built for you. Most founders in the Revenue Room are technical and many have never had formal sales training. We start from the ground up: diagnose in Week 1, build foundations in Week 2, layer skills progressively. If sales feels uncomfortable, that's not a sign it isn't for you. It's a sign you haven't built a system for it yet.<\u002Fdiv>\n        <\u002Fdetails>\n\n        <details>\n          <summary>What if I don't have a CRM yet? I'm still on a spreadsheet.<\u002Fsummary>\n          <div class=\"faq-answer\">That's completely fine, and more common than you'd think. Week 4 is specifically about setting up a CRM that works for your process. We'll help you choose one and actually get it working, not just opened and abandoned.<\u002Fdiv>\n        <\u002Fdetails>\n\n        <details>\n          <summary>What if my problem is lead generation, not closing?<\u002Fsummary>\n          <div class=\"faq-answer\">Then this might not be the right fit yet, and I'd rather be honest upfront. This program assumes you have conversations happening. If your primary challenge is getting people into the pipeline in the first place, let's talk about what makes sense before you invest here.<\u002Fdiv>\n        <\u002Fdetails>\n\n        <details>\n          <summary>Is this specific to a certain industry?<\u002Fsummary>\n          <div class=\"faq-answer\">The Revenue Room is built for B2B founders and high-ticket service businesses. The frameworks apply whether you're selling software, consulting, technical services, or any offer where the sale happens through a conversation, not a checkout page.<\u002Fdiv>\n        <\u002Fdetails>\n\n        <details>\n          <summary>What if I fall behind or get overwhelmed?<\u002Fsummary>\n          <div class=\"faq-answer\">Some weeks are heavier than others (Week 4 especially). That's why you have an accountability pod of 3-5 founders who check in weekly. You also have the Slack community for real-time support between sessions. The program is designed to push you, not bury you.<\u002Fdiv>\n        <\u002Fdetails>\n\n        <details>\n          <summary>Why 6 weeks instead of ongoing coaching?<\u002Fsummary>\n          <div class=\"faq-answer\">Because you don't need indefinite hand-holding. You need a Revenue Engine built once, correctly, that runs without me. Six weeks is enough to diagnose, build, practice, and document. After the Revenue Room closes, the system is yours to keep improving on your own.<\u002Fdiv>\n        <\u002Fdetails>\n\n        <details>\n          <summary>What does this cost, and what's the refund policy?<\u002Fsummary>\n          <div class=\"faq-answer\">Investment details are shared during the application process. If you're losing $5K+ deals because of gaps in your sales process, the Revenue Engine will pay for itself with your first close. Payment plans are available. If you complete Week 1 and feel this isn't the right fit, we'll issue a full refund, no questions asked. After Week 1, all seats are non-refundable.<\u002Fdiv>\n        <\u002Fdetails>\n\n        <details>\n          <summary>What happens after the 6 weeks?<\u002Fsummary>\n          <div class=\"faq-answer\">You keep your Revenue Engine forever. You also get continued access to the Slack community. Founding members will be grandfathered into community access for a full year at no additional cost.<\u002Fdiv>\n        <\u002Fdetails>\n\n        <details>\n          <summary>Can my accelerator or organization sponsor my seat?<\u002Fsummary>\n          <div class=\"faq-answer\">Absolutely. We work with accelerators, incubators, and founder-support organizations to sponsor seats. If you're part of a program and want to bring The Revenue Room to your cohort, mention it in your application and we'll loop in your program lead.<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- SPONSOR FAQ -->\n    <div class=\"faq-pane is-hidden\" data-pane=\"sponsors\">\n      <div class=\"faq-grid\">\n        <details>\n          <summary>How does seat sponsorship work for accelerators?<\u002Fsummary>\n          <div class=\"faq-answer\">We reserve cohort seats for partner accelerators and bill the sponsoring organization directly. Founders apply through our normal process; we coordinate the fit interview with your program lead so it counts as a structured intervention inside your program.<\u002Fdiv>\n        <\u002Fdetails>\n\n        <details>\n          <summary>What does this look like alongside our own programming?<\u002Fsummary>\n          <div class=\"faq-answer\">The Revenue Room slots in as a focused 6-week GTM workstream. We coordinate with your program calendar so live sessions don't conflict, and we share founder-level progress reports at Week 3 and Week 6 (with founder consent).<\u002Fdiv>\n        <\u002Fdetails>\n\n        <details>\n          <summary>Can we white-label or co-brand it?<\u002Fsummary>\n          <div class=\"faq-answer\">We don't white-label the curriculum, but we do offer co-branded cohorts for partner accelerators sponsoring 5+ seats. The Revenue Engine Method™ stays attributable, but the cohort can be branded for your program.<\u002Fdiv>\n        <\u002Fdetails>\n\n        <details>\n          <summary>What outcomes do you commit to for program leads?<\u002Fsummary>\n          <div class=\"faq-answer\">Each sponsored founder leaves with a documented Revenue Engine, a configured CRM, and a discovery + objection + closing playbook. We share aggregate cohort metrics (pipeline created, deals closed during program, qualification rate change) so you can report ROI to your funders.<\u002Fdiv>\n        <\u002Fdetails>\n\n        <details>\n          <summary>Is there a minimum or maximum number of seats?<\u002Fsummary>\n          <div class=\"faq-answer\">Minimum is 3 seats per cohort to qualify for sponsor pricing. Maximum is 7 seats per cohort (we keep at least 3 seats for direct-pay founders to maintain cohort diversity). We can run dedicated cohorts for 8+ seats with a 90-day lead time.<\u002Fdiv>\n        <\u002Fdetails>\n\n        <details>\n          <summary>How do you select which founders are a fit?<\u002Fsummary>\n          <div class=\"faq-answer\">B2B or high-ticket services, founder doing their own sales, with conversations happening but inconsistent closing. We'll co-review applicants with your program lead and only confirm seats for founders who are genuinely ready to use the program.<\u002Fdiv>\n        <\u002Fdetails>\n\n        <details>\n          <summary>What's the timeline and lead time required?<\u002Fsummary>\n          <div class=\"faq-answer\">We run 3 cohorts a year (Mar, Sept, Nov). Sponsor seats need to be confirmed at least 6 weeks before the cohort start to give founders time to onboard. Get in touch and we'll map your accelerator calendar against ours.<\u002Fdiv>\n        <\u002Fdetails>\n\n        <details>\n          <summary>Who do we contact to start a conversation?<\u002Fsummary>\n          <div class=\"faq-answer\">Email Irene directly at <a href=\"mailto:hello@digitalflowconsulting.ca\" style=\"color: var(--gold-deep);\">hello@digitalflowconsulting.ca<\u002Fa> with your program name, founder count, and target cohort. We'll send back a 1-page sponsor brief within 48 hours.<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════\n     CLOSING CTA\n════════════════════════════════════════ -->\n<section class=\"closing\" id=\"apply\" data-screen-label=\"Final CTA\">\n  <div class=\"closing-inner\">\n    <h2>Your Revenue Engine won't build itself.<br>But you don't have to build it alone.<\u002Fh2>\n    <p>You've been selling on instinct long enough. Six weeks from now, you could have a system that tells you exactly why deals close, why they don't, and what to do next. The Revenue Room is where that gets built, together, with founders who understand the journey.<\u002Fp>\n    <a href=\"apply.html\" class=\"cta-btn\">Apply for Cohort 02 <span class=\"cta-btn-arrow\">→<\u002Fspan><\u002Fa>\n    <p class=\"cta-sub\">Applications take 5 minutes · You'll hear back within 48 hours<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════\n     FOOTER\n════════════════════════════════════════ -->\n<footer class=\"footer\">\n  <div class=\"footer-inner\">\n    <div class=\"footer-brand-col\">\n      <div class=\"footer-brand\">The Revenue Room<\u002Fdiv>\n      <p class=\"footer-blurb\">A 6-week community accelerator for technical and B2B founders who want a real sales system — not another sales course.<\u002Fp>\n      <p class=\"footer-blurb\" style=\"font-style: italic;\">By <a href=\"https://digitalflowconsulting.ca\" style=\"color: var(--gold);\">DigitalFlow Consulting<\u002Fa>. Built by a founder, for founders.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"footer-col\">\n      <h4>Program<\u002Fh4>\n      <ul>\n        <li><a href=\"#program\">Curriculum<\u002Fa><\u002Fli>\n        <li><a href=\"#outcomes\">Outcomes<\u002Fa><\u002Fli>\n        <li><a href=\"#mentors\">Mentors<\u002Fa><\u002Fli>\n        <li><a href=\"#how-to-join\">How to join<\u002Fa><\u002Fli>\n        <li><a href=\"apply.html\">Apply<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"footer-col\">\n      <h4>Community<\u002Fh4>\n      <ul>\n        <li><a href=\"community.html\">Inside the room<\u002Fa><\u002Fli>\n        <li><a href=\"community.html#alumni\">Alumni network<\u002Fa><\u002Fli>\n        <li><a href=\"community.html#pods\">Accountability pods<\u002Fa><\u002Fli>\n        <li><a href=\"apply.html#sponsor\">Sponsor seats<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"footer-col\">\n      <h4>Company<\u002Fh4>\n      <ul>\n        <li><a href=\"about.html\">About Irene<\u002Fa><\u002Fli>\n        <li><a href=\"about.html#team\">The team<\u002Fa><\u002Fli>\n        <li><a href=\"mailto:hello@digitalflowconsulting.ca\">Contact<\u002Fa><\u002Fli>\n        <li><a href=\"https://digitalflowconsulting.ca\">DigitalFlow<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"footer-bottom\">\n    <span>© 2026 DigitalFlow Consulting<\u002Fspan>\n    <span>Halifax, NS &amp; remote · hello@digitalflowconsulting.ca<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- ════════════════════════════════════════\n     SCRIPTS\n════════════════════════════════════════ -->\n<script>\n// Sticky nav scroll state\nconst nav = document.getElementById('topnav');\nlet lastY = 0;\nwindow.addEventListener('scroll', () => {\n  const y = window.scrollY;\n  nav.classList.toggle('is-scrolled', y > 8);\n  lastY = y;\n}, { passive: true });\n\n// Active-section highlighting via IntersectionObserver\nconst sections = document.querySelectorAll('[id]');\nconst navLinks = document.querySelectorAll('.nav-link[data-target]');\nconst linkByTarget = {};\nnavLinks.forEach(l => linkByTarget[l.dataset.target] = l);\n\nconst io = new IntersectionObserver((entries) => {\n  entries.forEach(entry => {\n    const id = entry.target.id;\n    if (!linkByTarget[id]) return;\n    if (entry.isIntersecting) {\n      navLinks.forEach(l => l.classList.remove('is-active'));\n      linkByTarget[id].classList.add('is-active');\n    }\n  });\n}, { rootMargin: '-40% 0px -55% 0px', threshold: 0 });\n\ndocument.querySelectorAll('#program, #outcomes, #mentors, #faq').forEach(el => io.observe(el));\n\n// Module week filter\nconst weekFilter = document.getElementById('weekFilter');\nconst mods = document.querySelectorAll('#modules .mod');\nweekFilter.addEventListener('click', (e) => {\n  const btn = e.target.closest('button[data-week]');\n  if (!btn) return;\n  weekFilter.querySelectorAll('button').forEach(b => b.classList.remove('is-active'));\n  btn.classList.add('is-active');\n  const w = btn.dataset.week;\n  mods.forEach(m => {\n    if (w === 'all' || m.dataset.week === w) {\n      m.classList.remove('is-hidden');\n      // Auto-open the filtered module if filtering to one\n      if (w !== 'all') m.querySelector('details').setAttribute('open', '');\n    } else {\n      m.classList.add('is-hidden');\n    }\n  });\n});\n\n// FAQ tabs\nconst faqTabs = document.querySelectorAll('.faq-tab');\nconst faqPanes = document.querySelectorAll('.faq-pane');\nfaqTabs.forEach(tab => {\n  tab.addEventListener('click', () => {\n    faqTabs.forEach(t => t.classList.remove('is-active'));\n    tab.classList.add('is-active');\n    const target = tab.dataset.pane;\n    faqPanes.forEach(p => p.classList.toggle('is-hidden', p.dataset.pane !== target));\n  });\n});\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
